AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Complete AWS PCS ML Cluster deployment with nested stacks.
  This template orchestrates: Prerequisites (VPC, FSx), the PCS cluster, and its
  compute node groups (login + on-demand CPU + optional GPU). For pre-baking a
  custom DLAMI, run pcs-ready-dlami-with-enroot-pyxis.yaml as a separate stack
  and pass its DLAMIforPCSAmiId output as this template's AmiId parameter.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "1. Network Configuration"
        Parameters:
          - PrimarySubnetAZ
          - AdditionalSubnetAZ2
          - AdditionalSubnetAZ3
          - CreateS3Endpoint
      - Label:
          default: "2. PCS Cluster Configuration"
        Parameters:
          - SlurmVersion
          - LoginNodeInstanceType
          - RootVolumeSize
          - AmiId
          - SSHAccessCidr
          - ManagedAccounting
          - AccountingPolicyEnforcement
      - Label:
          default: "3. On-Demand Compute Node Group"
        Parameters:
          - DeployOnDemandCNG
          - OnDemandInstanceType
          - OnDemandMinCount
          - OnDemandMaxCount
          - OnDemandCngName
          - OnDemandQueueName
          - OnDemandEfaInterfaceCount
          - OnDemandPlacementGroupName
      - Label:
          default: "4. GPU Compute Node Group - P5/P6 Series (Optional)"
        Parameters:
          - DeployPseriesCNG
          - PseriesInstanceType
          - PseriesMinCount
          - PseriesMaxCount
          - CapacityReservationId
          - PseriesCngName
          - PseriesQueueName
      - Label:
          default: "5.1. Additional Cluster Configuration: Monitoring"
        Parameters:
          - MonitoringStack
          - GrafanaAccessCidr
          - MonitoringRepo
          - MonitoringVersion
          - DcgmExporterImage
      - Label:
          default: "5.2. Additional Cluster Configuration: Multi-User Directory"
        Parameters:
          - DirectoryService
          - DirectoryDomainSuffix
      - Label:
          default: "5.3. Additional Cluster Configuration: Post-Install Script (default: Enroot/Pyxis container runtime)"
        Parameters:
          - PostInstallScriptUrl
          - PostInstallScriptArgs
      - Label:
          default: "6. FSx Storage (/fsx and /home)"
        Parameters:
          - Capacity
          - LustreDeploymentType
          - PerUnitStorageThroughput
          - Compression
          - LustreVersion
          - FSxLustreEnableEfa
          - HomeCapacity
          - HomeThroughput
          - OpenZFSDeploymentType
      - Label:
          default: "7. Developer / Advanced (do not change for normal use)"
        Parameters:
          - S3BucketName
          - S3KeyPrefix
    ParameterLabels:
      # Friendly display names shown in the CloudFormation console 1-click UI,
      # so users see plain-language labels instead of raw CamelCase parameter keys.
      PrimarySubnetAZ:
        default: "Availability Zone (required)"
      AdditionalSubnetAZ2:
        default: "(Optional) 2nd AZ for an additional private subnet"
      AdditionalSubnetAZ3:
        default: "(Optional) 3rd AZ for an additional private subnet"
      CreateS3Endpoint:
        default: "Create S3 VPC endpoint"
      LoginNodeInstanceType:
        default: "Login node instance type"
      SlurmVersion:
        default: "Slurm version"
      SSHAccessCidr:
        default: "SSH access CIDR for login node (empty = SSM only)"
      MonitoringStack:
        default: "Monitoring stack (none or Prometheus-LoginNode)"
      GrafanaAccessCidr:
        default: "Grafana public access CIDR (empty = SSM port-forward only)"
      MonitoringVersion:
        default: "Advanced: Monitoring version (git ref)"
      MonitoringRepo:
        default: "Advanced: Monitoring repo (owner/repo)"
      DcgmExporterImage:
        default: "Advanced: dcgm-exporter image (default covers H100/B200/B300)"
      ManagedAccounting:
        default: "Slurm managed accounting"
      AccountingPolicyEnforcement:
        default: "Slurm accounting policy enforcement"
      PostInstallScriptUrl:
        default: "Post-install script URL (default installs Enroot/Pyxis)"
      PostInstallScriptArgs:
        default: "Post-install script arguments"
      RootVolumeSize:
        default: "Root volume size (GiB)"
      AmiId:
        default: "AMI ID (empty = SSM auto-resolve; pin in production)"
      DeployOnDemandCNG:
        default: "Deploy CPU (on-demand) queue"
      OnDemandInstanceType:
        default: "CPU queue instance type"
      OnDemandMinCount:
        default: "CPU queue min nodes"
      OnDemandMaxCount:
        default: "CPU queue max nodes"
      OnDemandCngName:
        default: "CPU node group name"
      OnDemandQueueName:
        default: "CPU queue name"
      OnDemandEfaInterfaceCount:
        default: "EFA interfaces on CPU queue (0 = off, 1 or 2 for HPC types)"
      OnDemandPlacementGroupName:
        default: "Existing placement group name (empty = auto-create when EFA on)"
      DeployPseriesCNG:
        default: "Deploy GPU (P5/P6) queue"
      PseriesInstanceType:
        default: "GPU instance type"
      PseriesMinCount:
        default: "GPU queue min nodes"
      PseriesMaxCount:
        default: "GPU queue max nodes"
      CapacityReservationId:
        default: "Capacity Block for ML reservation ID (leave empty for On-Demand/ODCR)"
      PseriesCngName:
        default: "GPU node group name"
      PseriesQueueName:
        default: "GPU queue name"
      Capacity:
        default: "FSx for Lustre (/fsx) capacity (GiB)"
      LustreDeploymentType:
        default: "FSx for Lustre (/fsx) deployment type"
      PerUnitStorageThroughput:
        default: "FSx for Lustre (/fsx) throughput (MB/s/TiB)"
      Compression:
        default: "FSx for Lustre (/fsx) compression"
      LustreVersion:
        default: "FSx for Lustre (/fsx) version"
      FSxLustreEnableEfa:
        default: "FSx for Lustre (/fsx) EFA + GDS support (PERSISTENT_2 only)"
      HomeCapacity:
        default: "FSx for OpenZFS (/home) capacity (GiB)"
      HomeThroughput:
        default: "FSx for OpenZFS (/home) throughput (MB/s)"
      OpenZFSDeploymentType:
        default: "FSx for OpenZFS (/home) deployment type"
      S3BucketName:
        default: "Nested templates S3 bucket"
      S3KeyPrefix:
        default: "Nested templates S3 key prefix"

Parameters:
  # S3 Configuration
  S3BucketName:
    Type: String
    Description: S3 bucket name where nested CloudFormation templates are stored
    Default: "awsome-distributed-ai"

  S3KeyPrefix:
    Type: String
    Description: S3 key prefix for nested templates (e.g., templates/aws-pcs/)
    Default: "templates/aws-pcs/"

  # Network Configuration
  PrimarySubnetAZ:
    Description: >-
      Availability Zone to deploy the cluster into. The only required choice --
      the public subnet (login node) and primary private subnet (compute nodes,
      FSx) are both placed here.
    Type: AWS::EC2::AvailabilityZone::Name

  AdditionalSubnetAZ2:
    Description: >-
      (Optional) 2nd Availability Zone for an additional private subnet. Empty
      (default) = single-AZ. Enables multi-AZ FSx (OpenZFS MULTI_AZ) and future
      multi-AZ workloads. The NAT gateway stays in the primary AZ.
    Type: String
    Default: ""

  AdditionalSubnetAZ3:
    Description: >-
      (Optional) 3rd Availability Zone for an additional private subnet. Empty
      (default) = not created. Requires AdditionalSubnetAZ2 to also be set.
    Type: String
    Default: ""

  CreateS3Endpoint:
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'true'
    Description: Set to false to avoid creating an S3 endpoint on your VPC.
    Type: String

  # FSx Storage Configuration
  Capacity:
    Description: Storage capacity in GiB (1200 or increments of 2400)
    Type: Number
    Default: 1200

  LustreDeploymentType:
    Description: >-
      FSx for Lustre deployment type. PERSISTENT_2 (default) supports throughput
      per TiB of 125/250/500/1000 but is not in every Region; PERSISTENT_1
      (50/100/200) is available in more Regions. Pick one your Region supports.
    Type: String
    Default: PERSISTENT_2
    AllowedValues:
      - PERSISTENT_2
      - PERSISTENT_1

  PerUnitStorageThroughput:
    Description: >-
      Lustre throughput (MB/s/TiB). Valid values depend on LustreDeploymentType
      (enforced by a template Rule): PERSISTENT_2 = 125/250/500/1000;
      PERSISTENT_1 = 50/100/200.
    Type: String
    Default: "250"
    AllowedValues: ["50", "100", "200", "125", "250", "500", "1000"]

  Compression:
    Description: Data compression type
    Type: String
    AllowedValues:
      - "LZ4"
      - "NONE"
    Default: "LZ4"

  LustreVersion:
    Description: Lustre software version
    Type: String
    AllowedValues:
      - "2.15"
      - "2.12"
    Default: "2.15"

  FSxLustreEnableEfa:
    Description: >-
      (Optional) Enable EFA on the FSx for Lustre filesystem. Default false.
      PERSISTENT_2 SSD only -- combining with PERSISTENT_1 fails the stack at
      create time via a Rule (rather than silently ignoring the opt-in). The
      headline feature is GPUDirect Storage (GDS) for P5/P5e/P5en/P6-B200 GPU
      clients, which DMAs file data straight into GPU memory (the NVIDIA
      nvidia-fs/cuFile stack must be installed on the client -- currently a
      ROADMAP follow-up). EFA-capable CPU CNGs (OnDemandEfaInterfaceCount > 0) get
      the EFA transport path to storage as a secondary benefit, useful when a
      single client is pushing past ~10 GBps. **EFA-enabled Lustre has a
      much higher minimum Capacity than non-EFA**: at PerUnitStorageThroughput=250
      the minimum is 19200 GiB (16x the non-EFA default of 1200 GiB). Set
      Capacity to >= the EFA minimum when enabling this; the full minimum-capacity
      matrix per throughput tier is in the FSx for Lustre User Guide.
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  # Multi-user directory
  DirectoryService:
    Type: String
    Description: >-
      Multi-user directory service. 'none' = single ubuntu user (default,
      unchanged). 'OpenLDAP-LoginNode' = deploy slapd on the login node (DB on shared
      /home/ldap-db), compute nodes configure SSSD as LDAP clients. Future
      options (SimpleAD, ManagedAD) will be added here. NOTE: OpenLDAP-LoginNode
      runs the directory server on a SINGLE login node — keep the login node
      group at 1 instance (do not scale it) while this is enabled. For
      multi-login-node / HA directories, use the future SimpleAD/ManagedAD options.
    Default: 'none'
    AllowedValues:
      - 'none'
      - 'OpenLDAP-LoginNode'

  DirectoryDomainSuffix:
    Type: String
    Description: >-
      LDAP domain suffix (e.g. dc=cluster,dc=internal). Only used when
      DirectoryService != none.
    Default: 'dc=cluster,dc=internal'

  HomeCapacity:
    Description: "Home directories storage capacity in GiB"
    Type: Number
    Default: 512

  HomeThroughput:
    Description: >-
      OpenZFS /home throughput (MB/s). Valid values depend on
      OpenZFSDeploymentType (enforced by a template Rule):
      SINGLE_AZ_HA_2 / SINGLE_AZ_2 = 160/320/640/1280/2560/3840/5120/7680/10240;
      SINGLE_AZ_HA_1 / SINGLE_AZ_1 = 64/128/256/512/1024/2048/3072/4096.
    Type: String
    Default: "320"
    AllowedValues:
      ["64", "128", "256", "512", "1024", "2048", "3072", "4096",
       "160", "320", "640", "1280", "2560", "3840", "5120", "7680", "10240"]

  OpenZFSDeploymentType:
    Description: >-
      FSx for OpenZFS deployment type for /home. SINGLE_AZ_HA_2 (default) is not
      in every Region; SINGLE_AZ_1 is available in all Regions. Pick one your
      Region supports (MULTI_AZ excluded — needs a second subnet).
    Type: String
    Default: SINGLE_AZ_HA_2
    AllowedValues:
      - SINGLE_AZ_HA_2
      - SINGLE_AZ_HA_1
      - SINGLE_AZ_2
      - SINGLE_AZ_1

  # AMI selection (used by every node group)
  AmiId:
    Type: String
    Description: >-
      AMI ID for every node group (login + compute). Empty (default) auto-resolves
      to the latest **PCS-Ready Deep Learning AMI** (Ubuntu 24.04, x86_64) from the
      SSM public parameter
      /aws/service/pcs/ami/dlami-base-ubuntu2404/x86_64/latest/ami-id. CloudFormation
      re-resolves SSM parameter values on every stack update, so a later scale-out
      can boot a newer AMI than the original nodes (drift). For production, pin to a
      specific ami-xxx -- e.g. one produced by pcs-ready-dlami-with-enroot-pyxis.yaml
      with Enroot/Pyxis pre-baked, or any other AMI built off the PCS-Ready DLAMI base.
    Default: ''
    AllowedPattern: '^$|^ami-[0-9a-f]{8,17}$'
    ConstraintDescription: Must be empty or a valid AMI ID (ami-xxxxxxxxx)

  PostInstallScriptUrl:
    Type: String
    Description: >-
      URL of a script run on every node at first boot (PCS equivalent of
      ParallelCluster OnNodeConfigured). Accepts an s3:// URL (fetched with the
      instance role — works with a private bucket) or an http(s):// URL (fetched
      with curl — public only). Leave EMPTY (default) to auto-install Enroot/Pyxis
      from the templates bucket (s3://<S3BucketName>/<S3KeyPrefix>scripts/install-enroot-pyxis.sh),
      so it works in dev accounts without public S3. Set to your own s3://or
      https:// script for custom first-boot setup, or to a single space to skip.
      Idempotent: a no-op if Enroot/Pyxis is already pre-baked into AmiId.
    Default: ''

  PostInstallScriptArgs:
    Type: String
    Description: Space-separated arguments passed to the post-install script.
    Default: ''

  # PCS Cluster Configuration
  SlurmVersion:
    Type: String
    Default: "25.11"
    Description: Version of Slurm to use
    AllowedValues:
      - "25.05"
      - "25.11"

  ManagedAccounting:
    Type: String
    Default: 'disabled'
    AllowedValues:
      - 'enabled'
      - 'disabled'
    Description: Monitor cluster usage, manage access control, and enforce resource limits with Slurm accounting.

  AccountingPolicyEnforcement:
    Description: Specify which Slurm accounting policies to enforce
    Type: String
    Default: none
    AllowedValues:
      - none
      - 'associations,limits,safe'

  LoginNodeInstanceType:
    Type: String
    Description: Instance Type for Login Node Group
    Default: "m6i.4xlarge"

  # Monitoring Configuration
  SSHAccessCidr:
    Type: String
    Description: >-
      (Optional) CIDR allowed to reach the login node on SSH/22. Empty (default)
      = SSH over SSM only. Set to your office IP or VPN range for direct SSH
      access (multi-user clusters, VS Code Remote, scp).
    Default: ""
    AllowedPattern: '^$|^((25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\.){3}(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)/(3[0-2]|[12]?\d)$'
    ConstraintDescription: Must be empty or a valid IPv4 CIDR (e.g. 203.0.113.4/32)

  MonitoringStack:
    Type: String
    Description: >-
      Monitoring stack to deploy. 'Prometheus-LoginNode' (default) installs
      Prometheus + Grafana + DCGM Exporter on the login node. 'none' skips
      monitoring entirely. Future options (AMP-AMG, CloudWatch) will be added.
    Default: 'Prometheus-LoginNode'
    AllowedValues:
      - 'Prometheus-LoginNode'
      - 'none'

  GrafanaAccessCidr:
    Type: String
    Description: >-
      (Optional) CIDR allowed to reach the login node on HTTPS/443 (Grafana).
      Empty (default) = SSM port-forward only. When set, also exposes the
      unauthenticated /prometheus/, /pushgateway/, /slurmexporter/ proxy paths.
      Use the tightest CIDR you can; clear it when done.
    Default: ""
    AllowedPattern: '^$|^((25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\.){3}(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)/(3[0-2]|[12]?\d)$'
    ConstraintDescription: Must be empty or a valid IPv4 CIDR (e.g. 203.0.113.4/32)

  MonitoringVersion:
    Type: String
    Description: >-
      aws-parallelcluster-monitoring git ref to install (release tag, branch, or
      'latest'). Passed down to the CNG stacks, which fetch post-install.sh from
      MonitoringRepo at this ref and pass it as the ref argument. Pin to a release
      tag in production; a branch name + MonitoringRepo fork can be used to test
      unreleased changes.
    Default: 'v2.10.2'

  MonitoringRepo:
    Type: String
    Description: >-
      GitHub "owner/repo" to fetch the monitoring stack from. Override with a fork
      together with a branch in MonitoringVersion to test unreleased changes.
    Default: 'aws-samples/aws-parallelcluster-monitoring'

  DcgmExporterImage:
    Type: String
    Description: >-
      dcgm-exporter image for GPU nodes. Default = DCGM 4.5.2 by digest, covering
      H100/B200/B300 (digest pull bypasses the Docker 29.x OCI-index failure on
      newer NVCR tags). Override to pin a different build (also use a digest).
      No effect on CPU nodes.
    Default: 'nvcr.io/nvidia/k8s/dcgm-exporter@sha256:a7ad6547d4546eaf4dd5d6b4c0b4db4101e63ef7dc3cdff7f42b767d2c60b706'

  # On-Demand Compute Node Group
  DeployOnDemandCNG:
    Type: String
    Description: Deploy on-demand compute node group
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  OnDemandCngName:
    Type: String
    Description: Name for on-demand compute node group
    Default: "cpu1"

  OnDemandQueueName:
    Type: String
    Description: Queue name for on-demand compute node group
    Default: "cpu1"

  OnDemandInstanceType:
    Type: String
    Description: Instance type for on-demand compute node group
    Default: "c6i.4xlarge"

  OnDemandMaxCount:
    Type: Number
    Description: Maximum number of instances for on-demand compute node group
    Default: 4
    MinValue: 0

  OnDemandMinCount:
    Type: Number
    Description: Minimum number of instances for on-demand compute node group (must be 0 for dynamic scaling)
    Default: 0
    MinValue: 0

  # EFA on the on-demand CPU CNG (for HPC instances like hpc8a/hpc7a/hpc6a).
  # GPU CNGs (P5/P6) have their own multi-NIC EFA wiring in the dedicated
  # add-cng-p5/p6-* templates; this knob does NOT affect those.
  OnDemandEfaInterfaceCount:
    Type: Number
    Description: >-
      Number of Elastic Fabric Adapter (EFA) interfaces on the on-demand (CPU)
      compute node group. 0 (default) = no EFA (standard ENA networking). 1 or 2
      = enable EFA with that many interfaces (switches to a NetworkInterfaces
      LaunchTemplate + a cluster placement group). Set the count to the instance
      type's MaximumEfaInterfaces: hpc8a.96xlarge / hpc7a.* / hpc6id.32xlarge = 2;
      hpc6a.48xlarge / c7i.metal = 1. EFA requires an EFA-capable type — a non-EFA
      type (e.g. the default c6i.4xlarge) fails to launch with count > 0. No
      effect on the P-series GPU CNG.
    Default: 0
    AllowedValues: [0, 1, 2]

  OnDemandPlacementGroupName:
    Type: String
    Description: >-
      (Optional, advanced) Existing cluster placement group name to launch the
      on-demand CPU nodes into. Leave empty (default) to auto-create a per-CNG
      cluster placement group when OnDemandEfaInterfaceCount > 0. Set to reuse an
      existing PG (e.g. shared across multiple CPU CNGs, or a customer-owned CPG
      holding reserved capacity). CPU CNG only. Ignored when
      OnDemandEfaInterfaceCount = 0.
    Default: ''

  # P-series Compute Node Group
  DeployPseriesCNG:
    Type: String
    Description: Deploy P-series (P5/P6) compute node group
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  PseriesCngName:
    Type: String
    Description: Name for P-series compute node group
    Default: "gpu-p5"

  PseriesQueueName:
    Type: String
    Description: Queue name for P-series compute node group
    Default: "gpu-p5"

  PseriesInstanceType:
    Type: String
    Description: >-
      Instance type for the P-series compute node group. The right multi-NIC EFA
      template AND interface count are selected automatically from this value:
      p5* use add-cng-p5.yaml (p5/p5e = 32 NICs, p5en = 16), p6-b200.48xlarge uses
      add-cng-p6-b200.yaml (8 NICs), p6-b300.48xlarge uses add-cng-p6-b300.yaml (17 NICs).
    Default: "p5.48xlarge"
    AllowedValues:
      - p5.48xlarge
      - p5e.48xlarge
      - p5en.48xlarge
      - p6-b200.48xlarge
      - p6-b300.48xlarge

  PseriesMaxCount:
    Type: Number
    Description: Maximum number of instances for P-series compute node group
    Default: 4
    MinValue: 0

  PseriesMinCount:
    Type: Number
    Description: Minimum number of instances for P-series compute node group (must be 0 for testing without Capacity Reservation)
    Default: 0
    MinValue: 0

  CapacityReservationId:
    Type: String
    Default: ""
    Description: >-
      (Optional) **Capacity Block for ML reservation ID** for the GPU node group.
      When SET, GPU nodes launch with MarketType=capacity-block against this
      reservation. Leave EMPTY for On-Demand. This parameter is for Capacity
      Blocks ONLY -- do NOT put an On-Demand Capacity Reservation (ODCR) ID here;
      an "open" ODCR is consumed automatically by On-Demand launches, so for ODCR
      leave this empty.

  RootVolumeSize:
    Type: Number
    Description: >-
      Root EBS volume size (GiB) for all node groups. The PCS-Ready DLAMI default
      (~75 GiB) is too small for pulling/importing large container images; 300
      GiB gives ample headroom. Passed down to every compute node group stack.
    Default: 300
    MinValue: 75

# FSx throughput is a discrete grid that depends on the chosen deployment type.
# These Rules reject an invalid (DeploymentType, throughput) pair at stack-create
# time with a clear message, instead of letting it fail deep inside the nested
# prerequisites stack as an opaque CreateFileSystem error.
Rules:
  LustrePersistent1Throughput:
    RuleCondition: !Equals [!Ref LustreDeploymentType, 'PERSISTENT_1']
    Assertions:
      - Assert: !Contains [["50", "100", "200"], !Ref PerUnitStorageThroughput]
        AssertDescription: >-
          PERSISTENT_1 supports PerUnitStorageThroughput of 50, 100, or 200 MB/s/TiB only.
  LustrePersistent2Throughput:
    RuleCondition: !Equals [!Ref LustreDeploymentType, 'PERSISTENT_2']
    Assertions:
      - Assert: !Contains [["125", "250", "500", "1000"], !Ref PerUnitStorageThroughput]
        AssertDescription: >-
          PERSISTENT_2 supports PerUnitStorageThroughput of 125, 250, 500, or 1000 MB/s/TiB only.
  OpenZFS64GridThroughput:
    RuleCondition: !Or
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_1']
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_HA_1']
    Assertions:
      - Assert: !Contains [["64", "128", "256", "512", "1024", "2048", "3072", "4096"], !Ref HomeThroughput]
        AssertDescription: >-
          SINGLE_AZ_1 / SINGLE_AZ_HA_1 support HomeThroughput of
          64/128/256/512/1024/2048/3072/4096 MB/s only.
  OpenZFS160GridThroughput:
    RuleCondition: !Or
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_2']
      - !Equals [!Ref OpenZFSDeploymentType, 'SINGLE_AZ_HA_2']
    Assertions:
      - Assert: !Contains [["160", "320", "640", "1280", "2560", "3840", "5120", "7680", "10240"], !Ref HomeThroughput]
        AssertDescription: >-
          SINGLE_AZ_2 / SINGLE_AZ_HA_2 support HomeThroughput of
          160/320/640/1280/2560/3840/5120/7680/10240 MB/s only.
  # FSx EFA is a PERSISTENT_2-only feature. Fail at the parent stack's create
  # time -- before any nested resources are launched -- if the user opted in
  # on PERSISTENT_1, instead of silently dropping the EfaEnabled property.
  FSxLustreEfaRequiresPersistent2:
    RuleCondition: !Equals [!Ref FSxLustreEnableEfa, 'true']
    Assertions:
      - Assert: !Equals [!Ref LustreDeploymentType, 'PERSISTENT_2']
        AssertDescription: >-
          FSxLustreEnableEfa=true requires LustreDeploymentType=PERSISTENT_2
          (EFA on FSx for Lustre is a PERSISTENT_2-only feature).

Conditions:
  UseLocalTemplates: !Equals [!Ref S3BucketName, 'local']
  # When PostInstallScriptUrl is left empty, default it to the Enroot/Pyxis
  # installer in the templates bucket (s3://, fetched via the instance role —
  # works with a private bucket). A non-empty value (s3:// or https://) is used
  # verbatim; a single space disables the post-install hook.
  PostInstallScriptUrlIsDefault: !Equals [!Ref PostInstallScriptUrl, '']
  DeployOnDemandCNGEnabled: !Equals [!Ref DeployOnDemandCNG, 'true']
  DirectoryEnabled: !Not [!Equals [!Ref DirectoryService, 'none']]
  DeployPseriesCNGEnabled: !Equals [!Ref DeployPseriesCNG, 'true']
  # Open Grafana (login node, HTTPS/443) to a CIDR only when one is provided.
  SSHAccessEnabled: !Not [!Equals [!Ref SSHAccessCidr, ""]]
  GrafanaAccessEnabled: !Not [!Equals [!Ref GrafanaAccessCidr, ""]]
  LoginAccessEnabled: !Or
    - !Condition SSHAccessEnabled
    - !Condition GrafanaAccessEnabled
  MonitoringEnabled: !Not [!Equals [!Ref MonitoringStack, 'none']]
  # Select the right multi-NIC EFA template from the P-series instance type.
  # p6-b200/p6-b300 have different network-card counts than P5, so each family
  # gets its own nested stack; anything else falls back to the P5 template.
  PseriesIsP6B200: !And
    - !Condition DeployPseriesCNGEnabled
    - !Equals [!Ref PseriesInstanceType, 'p6-b200.48xlarge']
  PseriesIsP6B300: !And
    - !Condition DeployPseriesCNGEnabled
    - !Equals [!Ref PseriesInstanceType, 'p6-b300.48xlarge']
  PseriesIsP5: !And
    - !Condition DeployPseriesCNGEnabled
    - !Not [!Equals [!Ref PseriesInstanceType, 'p6-b200.48xlarge']]
    - !Not [!Equals [!Ref PseriesInstanceType, 'p6-b300.48xlarge']]

Resources:
  #############################################################################
  # 1. Prerequisites Stack (VPC, FSx)
  #############################################################################
  PrerequisitesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - ml-cluster-prerequisites.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}ml-cluster-prerequisites.yaml'
      Parameters:
        VPCName: !Sub '${AWS::StackName}-VPC'
        PrimarySubnetAZ: !Ref PrimarySubnetAZ
        AdditionalSubnetAZ2: !Ref AdditionalSubnetAZ2
        AdditionalSubnetAZ3: !Ref AdditionalSubnetAZ3
        CreateS3Endpoint: !Ref CreateS3Endpoint
        Capacity: !Ref Capacity
        LustreDeploymentType: !Ref LustreDeploymentType
        PerUnitStorageThroughput: !Ref PerUnitStorageThroughput
        Compression: !Ref Compression
        LustreVersion: !Ref LustreVersion
        FSxLustreEnableEfa: !Ref FSxLustreEnableEfa
        HomeCapacity: !Ref HomeCapacity
        HomeThroughput: !Ref HomeThroughput
        OpenZFSDeploymentType: !Ref OpenZFSDeploymentType
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Prerequisites'

  #############################################################################
  # 2. PCS Cluster Stack (Scheduler only, no compute nodes)
  #############################################################################
  ClusterStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - cluster.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}cluster.yaml'
      Parameters:
        ClusterName: !Sub '${AWS::StackName}'
        PrivateSubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        DefaultSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        SlurmVersion: !Ref SlurmVersion
        ManagedAccounting: !Ref ManagedAccounting
        AccountingPolicyEnforcement: !Ref AccountingPolicyEnforcement
        DeployMonitoring: !If [MonitoringEnabled, "true", "false"]
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Cluster'

  #############################################################################
  # 4. Login Node Group Stack
  #############################################################################
  # Optional login-only security group for SSH and/or Grafana access from a
  # specific CIDR. Created when SSHAccessCidr and/or GrafanaAccessCidr is set.
  # Attached ONLY to the login node (via ExtraSecurityGroupId) — compute nodes
  # and FSx (which share the cluster security group) are NOT exposed.
  LoginAccessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: LoginAccessEnabled
    Properties:
      GroupDescription: Allow inbound SSH/HTTPS to the login node from trusted CIDRs
      VpcId: !GetAtt PrerequisitesStack.Outputs.VPC
      SecurityGroupIngress:
        - !If
          - SSHAccessEnabled
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref SSHAccessCidr
            Description: SSH from SSHAccessCidr
          - !Ref AWS::NoValue
        - !If
          - GrafanaAccessEnabled
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: !Ref GrafanaAccessCidr
            Description: Grafana HTTPS from GrafanaAccessCidr
          - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-login-access'

  LoginNodeGroupStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: login
        QueueName: ""
        InstanceType: !Ref LoginNodeInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: 1
        MinCount: 1
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PublicSubnet
        AmiId: !Ref AmiId
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        ExtraSecurityGroupId: !If
          - LoginAccessEnabled
          - !Ref LoginAccessSecurityGroup
          - ""
        # Login node runs the OpenLDAP server, so it gets the login-only profile
        # (base perms + ldap/* SSM + KMS decrypt). Compute CNGs below keep the
        # base InstanceProfileArn, which cannot read the LDAP admin password.
        IamProfileArn: !GetAtt ClusterStack.Outputs.LoginInstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        DeployMonitoring: !If [MonitoringEnabled, "true", "false"]
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRepo: !Ref MonitoringRepo
        DcgmExporterImage: !Ref DcgmExporterImage
        SlurmVersion: !Ref SlurmVersion
        MonitoringRole: login
        PostInstallScriptUrl: !If
          - PostInstallScriptUrlIsDefault
          - !Sub 's3://${S3BucketName}/${S3KeyPrefix}scripts/install-enroot-pyxis.sh'
          - !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
        DirectoryRole: !If [DirectoryEnabled, 'server', 'none']
        DirectoryDomainSuffix: !Ref DirectoryDomainSuffix
        S3BucketName: !Ref S3BucketName
        S3KeyPrefix: !Ref S3KeyPrefix
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-LoginNodeGroup'

  #############################################################################
  # 5. On-Demand Compute Node Group Stack
  #############################################################################
  OnDemandCNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployOnDemandCNGEnabled
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref OnDemandCngName
        QueueName: !Ref OnDemandQueueName
        InstanceType: !Ref OnDemandInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: !Ref OnDemandMaxCount
        MinCount: !Ref OnDemandMinCount
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !Ref AmiId
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        DeployMonitoring: !If [MonitoringEnabled, "true", "false"]
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRepo: !Ref MonitoringRepo
        DcgmExporterImage: !Ref DcgmExporterImage
        SlurmVersion: !Ref SlurmVersion
        MonitoringRole: compute
        PostInstallScriptUrl: !If
          - PostInstallScriptUrlIsDefault
          - !Sub 's3://${S3BucketName}/${S3KeyPrefix}scripts/install-enroot-pyxis.sh'
          - !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
        # EFA on CPU HPC instances (hpc8a/hpc7a/hpc6a). add-cng.yaml enables EFA
        # when EfaInterfaceCount > 0 and auto-creates a per-CNG cluster placement
        # group when PlacementGroupName is empty.
        EfaInterfaceCount: !Ref OnDemandEfaInterfaceCount
        PlacementGroupName: !Ref OnDemandPlacementGroupName
        DirectoryRole: !If [DirectoryEnabled, 'client', 'none']
        DirectoryDomainSuffix: !Ref DirectoryDomainSuffix
        S3BucketName: !Ref S3BucketName
        S3KeyPrefix: !Ref S3KeyPrefix
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-OnDemandCNG'

  #############################################################################
  # 6. P-series Compute Node Group Stack
  #############################################################################
  PseriesCNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: PseriesIsP5
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng-p5.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng-p5.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref PseriesCngName
        QueueName: !Ref PseriesQueueName
        InstanceType: !Ref PseriesInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: !Ref PseriesMaxCount
        MinCount: !Ref PseriesMinCount
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !Ref AmiId
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        CapacityReservationId: !Ref CapacityReservationId
        DeployMonitoring: !If [MonitoringEnabled, "true", "false"]
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRepo: !Ref MonitoringRepo
        DcgmExporterImage: !Ref DcgmExporterImage
        SlurmVersion: !Ref SlurmVersion
        MonitoringRole: compute
        PostInstallScriptUrl: !If
          - PostInstallScriptUrlIsDefault
          - !Sub 's3://${S3BucketName}/${S3KeyPrefix}scripts/install-enroot-pyxis.sh'
          - !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
        DirectoryRole: !If [DirectoryEnabled, 'client', 'none']
        DirectoryDomainSuffix: !Ref DirectoryDomainSuffix
        S3BucketName: !Ref S3BucketName
        S3KeyPrefix: !Ref S3KeyPrefix
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PseriesCNG'

  #############################################################################
  # 6b. P6-B200 Compute Node Group Stack (8 NICs, fixed)
  #############################################################################
  P6B200CNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: PseriesIsP6B200
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng-p6-b200.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng-p6-b200.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref PseriesCngName
        QueueName: !Ref PseriesQueueName
        InstanceType: !Ref PseriesInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: !Ref PseriesMaxCount
        MinCount: !Ref PseriesMinCount
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !Ref AmiId
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        CapacityReservationId: !Ref CapacityReservationId
        DeployMonitoring: !If [MonitoringEnabled, "true", "false"]
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRepo: !Ref MonitoringRepo
        DcgmExporterImage: !Ref DcgmExporterImage
        SlurmVersion: !Ref SlurmVersion
        MonitoringRole: compute
        PostInstallScriptUrl: !If
          - PostInstallScriptUrlIsDefault
          - !Sub 's3://${S3BucketName}/${S3KeyPrefix}scripts/install-enroot-pyxis.sh'
          - !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
        DirectoryRole: !If [DirectoryEnabled, 'client', 'none']
        DirectoryDomainSuffix: !Ref DirectoryDomainSuffix
        S3BucketName: !Ref S3BucketName
        S3KeyPrefix: !Ref S3KeyPrefix
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PseriesCNG'

  #############################################################################
  # 6c. P6-B300 Compute Node Group Stack (17 NICs, fixed)
  #############################################################################
  P6B300CNGStack:
    Type: AWS::CloudFormation::Stack
    Condition: PseriesIsP6B300
    DependsOn: ClusterStack
    Properties:
      TemplateURL: !If
        - UseLocalTemplates
        - add-cng-p6-b300.yaml
        - !Sub 'https://${S3BucketName}.s3.amazonaws.com/${S3KeyPrefix}add-cng-p6-b300.yaml'
      Parameters:
        ClusterId: !GetAtt ClusterStack.Outputs.ClusterId
        ClusterName: !Sub '${AWS::StackName}'
        CngName: !Ref PseriesCngName
        QueueName: !Ref PseriesQueueName
        InstanceType: !Ref PseriesInstanceType
        RootVolumeSize: !Ref RootVolumeSize
        MaxCount: !Ref PseriesMaxCount
        MinCount: !Ref PseriesMinCount
        SubnetId: !GetAtt PrerequisitesStack.Outputs.PrimaryPrivateSubnet
        AmiId: !Ref AmiId
        ClusterSecurityGroupId: !GetAtt PrerequisitesStack.Outputs.SecurityGroup
        IamProfileArn: !GetAtt ClusterStack.Outputs.InstanceProfileArn
        FSxLustreFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId
        FSxLustreFilesystemMountName: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemMountname
        FSxOpenZFSFilesystemId: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
        CapacityReservationId: !Ref CapacityReservationId
        DeployMonitoring: !If [MonitoringEnabled, "true", "false"]
        MonitoringVersion: !Ref MonitoringVersion
        MonitoringRepo: !Ref MonitoringRepo
        DcgmExporterImage: !Ref DcgmExporterImage
        SlurmVersion: !Ref SlurmVersion
        MonitoringRole: compute
        PostInstallScriptUrl: !If
          - PostInstallScriptUrlIsDefault
          - !Sub 's3://${S3BucketName}/${S3KeyPrefix}scripts/install-enroot-pyxis.sh'
          - !Ref PostInstallScriptUrl
        PostInstallScriptArgs: !Ref PostInstallScriptArgs
        DirectoryRole: !If [DirectoryEnabled, 'client', 'none']
        DirectoryDomainSuffix: !Ref DirectoryDomainSuffix
        S3BucketName: !Ref S3BucketName
        S3KeyPrefix: !Ref S3KeyPrefix
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PseriesCNG'

Outputs:
  ClusterId:
    Description: PCS Cluster ID
    Value: !GetAtt ClusterStack.Outputs.ClusterId

  InstanceProfileArn:
    Description: IAM Instance Profile ARN
    Value: !GetAtt ClusterStack.Outputs.InstanceProfileArn

  VPCId:
    Description: VPC ID
    Value: !GetAtt PrerequisitesStack.Outputs.VPC

  FSxLustreId:
    Description: FSx for Lustre filesystem ID
    Value: !GetAtt PrerequisitesStack.Outputs.FSxLustreFilesystemId

  FSxOpenZFSId:
    Description: FSx for OpenZFS filesystem ID
    Value: !GetAtt PrerequisitesStack.Outputs.FSxOFilesystemId
